<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TJKT SMK MODERN</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <style>
    *{font-family:'Poppins',sans-serif;scroll-behavior:smooth}
    html,body{overflow-x:hidden}
    body{background:#0f172a;color:white;transition:.4s}
    .glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1)}
    .glow{box-shadow:0 0 20px rgba(6,182,212,0.5)}
    .sidebar{transition:.4s}
  </style>
</head>

<body>

<!-- LOGIN MODAL -->
<div id="loginModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-[99999]">
  <div class="glass p-8 rounded-2xl w-80">
    <h2 class="text-2xl font-bold text-cyan-400 mb-6 text-center">Login Admin</h2>

    <input id="username" type="text" placeholder="Username"
      class="w-full p-3 mb-3 rounded-xl bg-slate-800 border border-cyan-400">

    <input id="password" type="password" placeholder="Password"
      class="w-full p-3 mb-5 rounded-xl bg-slate-800 border border-cyan-400">

    <button id="submitLogin"
      class="w-full bg-cyan-500 py-3 rounded-xl font-semibold">
      Masuk
    </button>

    <button id="closeLogin" class="w-full mt-3 text-red-400">
      Tutup
    </button>
  </div>
</div>

<!-- NAVBAR -->
<nav class="fixed w-full z-50 bg-slate-900/80 backdrop-blur-md">
  <div class="max-w-7xl mx-auto flex justify-between items-center p-4">

    <h1 class="text-2xl font-bold text-cyan-400">TJKT</h1>

    <div class="flex items-center gap-3">

      <button id="loginBtn" class="bg-white text-black px-4 py-2 rounded-xl font-semibold">
        Login
      </button>

      <span id="userStatus" class="text-cyan-400 font-semibold hidden"></span>

      <button id="logoutBtn" class="hidden bg-red-500 px-4 py-2 rounded-xl font-semibold">
        Logout
      </button>

    </div>
  </div>
</nav>

<!-- HERO -->
<section class="min-h-screen flex items-center justify-center text-center">
  <h1 class="text-5xl font-bold text-cyan-400 glow p-4 rounded-xl">
    TJKT SMK MODERN
  </h1>
</section>

<!-- SCRIPT -->
<script>

  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const loginModal = document.getElementById('loginModal');
  const closeLogin = document.getElementById('closeLogin');
  const submitLogin = document.getElementById('submitLogin');
  const userStatus = document.getElementById('userStatus');

  // open modal
  loginBtn.onclick = () => {
    loginModal.classList.remove('hidden');
    loginModal.classList.add('flex');
  };

  // close modal
  closeLogin.onclick = () => {
    loginModal.classList.add('hidden');
    loginModal.classList.remove('flex');
  };

  // login
  submitLogin.onclick = () => {
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;

    if(u === "admin" && p === "1234"){
      loginBtn.classList.add('hidden');
      logoutBtn.classList.remove('hidden');
      userStatus.classList.remove('hidden');
      userStatus.innerText = "Halo, " + u;

      loginModal.classList.add('hidden');
      loginModal.classList.remove('flex');

      alert("Login berhasil");
    } else {
      alert("Login gagal");
    }
  };

  // logout
  logoutBtn.onclick = () => {
    loginBtn.classList.remove('hidden');
    logoutBtn.classList.add('hidden');
    userStatus.classList.add('hidden');
  };

</script>

</body>
</html>
